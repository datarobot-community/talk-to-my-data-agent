---
# File generated by DataRobot CLI, regenerate using `dr task compose`
version: '3'
env:
  ENV: testing
dotenv: ['.env', '.env.{{.ENV}}']
includes:
  app_backend:
    taskfile: ./app_backend/Taskfile.yaml
    dir: ./app_backend
  app_frontend:
    taskfile: ./app_frontend/Taskfile.yaml
    dir: ./app_frontend
  core:
    taskfile: ./core/Taskfile.yaml
    dir: ./core
  e2e:
    taskfile: ./tests/e2e/Taskfile.yaml
    dir: ./tests/e2e
    optional: true
  infra:
    taskfile: ./infra/Taskfile.yaml
    dir: ./infra
tasks:
  default:
    desc: "ℹ️ Show all available tasks (run `task --list-all` to see hidden tasks)"
    cmds:
      - task --list --sort none
    silent: true

  start:
    desc: "💻 Prepare local development environment"
    cmds:
      - dr self update
      - dr dotenv setup --if-needed
      - task install
      - task infra:start
      - echo '✅ You are all set. Run `task dev` to start developing, or run `task deploy` to deploy to DataRobot.'

  lint:
    desc: "🧹 Run linters"
    cmds:
      - task: app_backend:lint
      - task: app_frontend:lint
      - task: core:lint
      - task: infra:lint

  install:
    desc: "🛠️ Install all dependencies"
    cmds:
      - task: app_backend:install
      - task: app_frontend:install
      - task: core:install
      - task: infra:install

  reinstall:
    desc: "🛠️ Reinstall all dependencies (placeholder task)"

  test:
    desc: "🧪 Run tests across all components"
    cmds:
      - task: app_backend:test
      - task: app_frontend:test
      - task: core:test
  dev:
    desc: "🚀 Run all services together"
    cmds:
      - |
        task app_backend:dev &
        sleep 3
        task app_frontend:dev &
        sleep 8
        echo "✅ All servers started!"
        if [[ -n "$NOTEBOOK_ID" ]]; then
          prefix="${DATAROBOT_API_ENDPOINT//api\/v2/}notebook-sessions/$NOTEBOOK_ID/ports/"
        else
          prefix="http://localhost:"
        fi
        echo "🔗 Backend: ${prefix}8080"
        echo "🔗 Frontend: ${prefix}5173"
        wait
  tracing:start:
    desc: "📡 Start the local experimentation tracing dashboard (Ctrl+C to stop)"
    cmds:
      - |
        USE_CASE_ID=$(cd infra && uv run pulumi stack output DATAROBOT_USE_CASE_ID 2>/dev/null)
        if [[ -z "$USE_CASE_ID" ]]; then
          echo "No Use Case found in current Pulumi stack. Run 'task start' first."
          exit 1
        fi
        dr xp --entity-type experiment_container --entity-id "$USE_CASE_ID"
    silent: true

  deploy:
    desc: "🚀 Deploy all services"
    env:
      AGENT_DEPLOY: "1"
    cmds:
      - task: infra:deploy
  deploy-dev:
    desc: "🚀 Deploy infrastructure and services to development"
    cmds:
      - task: infra:deploy-dev
