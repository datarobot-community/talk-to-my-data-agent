---
root:
  - env: INFRA_ENABLE_LLM
    type: string
    default: "gateway_direct.py"
    help: >
      Choose your LLM integration.


      - For the simplest setup, select DataRobot's "LLM Gateway".

      - If you already have a custom model deployed LLM and a deployment ID, select "DataRobot Deployed LLM".

      - If you want to use your LLM provider credentials instead of the LLM gateway with an LLM Blureprint (e.g. Azure OpenAI,

      AWS Bedrock, GCP VertexAI, Anthropic, Cohere, TogetherAI), select "LLM Blueprint with External LLM".

      - If you need full DataRobot governance and monitoring with LLM Blueprint support,

      select "LLM Blueprint with LLM Gateway" for the most production-ready option.

      - If you have an existing registered model (not yet deployed) that you want to use with

      an LLM Blueprint, select "LLM from a Registered Model".
      
      - If you want to use your own LLM provider credentials (e.g. Azure OpenAI, AWS Bedrock,

      GCP VertexAI, Anthropic, Cohere, TogetherAI) directly, without creating an LLM Blueprint,

      select "External LLM".

    options:
      - name: "LLM Gateway"
        value: "gateway_direct.py"
        requires: llm_gateway
      - name: "DataRobot Deployed LLM"
        value: "deployed_llm.py"
        requires: deployed_llm
      - name: "DataRobot NIM Deployed LLM"
        value: "nim_deployed_llm.py"
        requires: nim_deployed_llm
      - name: "LLM Blueprint with External LLM"
        value: "blueprint_with_external_llm.py"
        requires: blueprint_with_external_llm
      - name: "LLM Blueprint with LLM Gateway"
        value: "blueprint_with_llm_gateway.py"
        requires: llm_gateway
      - name: "LLM from a Registered Model"
        value: "registered_model.py"
        requires: registered_model
      - name: "External LLM"
        value: "external_llm.py"
        requires: external_llm  

llm_gateway:
  - env: LLM_DEFAULT_MODEL
    type: llmgw_catalog
    optional: false
    help: "Choose an LLM from the DataRobot LLM Gateway catalog to use for your LLM Blueprint."

deployed_llm:
  - env: LLM_DEPLOYMENT_ID
    type: string
    optional: false
    help: "Enter the deployment ID of the DataRobot custom model deployed LLM (e.g., 6510c7b7c4f3f9407e24a849)."
  - env: USE_DATAROBOT_LLM_GATEWAY
    type: string
    default: "0"
    hidden: true

nim_deployed_llm:
  - env: LLM_NIM_DEPLOYMENT_ID
    type: string
    optional: false
    help: "Enter the deployment ID of the DataRobot custom model deployed LLM (e.g., 6510c7b7c4f3f9407e24a849)."
  - env: LLM_DEFAULT_MODEL
    type: string
    optional: false
    help: "Enter the default model of the DataRobot custom model deployed LLM (e.g., meta-llama/Llama-3.1-8B)."
  - env: USE_DATAROBOT_LLM_GATEWAY
    type: string
    default: "0"
    hidden: true

registered_model:
  - env: TEXTGEN_REGISTERED_MODEL_ID
    type: string
    optional: false
    help: "Enter the ID of the registered model with an LLM blueprint to use."
  - env: DATAROBOT_TIMEOUT_MINUTES
    type: number
    default: 30
    optional: true
    help: "Enter the timeout in minutes for DataRobot operations (default: 30 minutes)."

blueprint_with_external_llm:
  - env: USE_DATAROBOT_LLM_GATEWAY
    type: string
    default: "0"
    hidden: true
  - key: external_llm_provider
    optional: false
    options:
      - name: "Azure with OpenAI"
        requires: azure_openai
      - name: "Google VertexAI"
        requires: vertexai
      - name: "Anthropic"
        requires: anthropic
      - name: "Bedrock"
        requires: bedrock
      - name: "Cohere"
        requires: cohere
      - name: "TogetherAI"
        requires: togetherai
    help: >
      Choose which external LLM provider to use.


      Supported providers are: Azure OpenAI, AWS Bedrock, GCP VertexAI, Anthropic, Cohere, or TogetherAI.

external_llm:
  - env: USE_DATAROBOT_LLM_GATEWAY
    type: string
    default: "amazon-anthropic-claude-sonnet-4-5-20250929-v1"
    optional: true
    help: >
      LiteLLM model name used at runtime to call your external LLM.
      Example: "azure/gpt-4o", "bedrock/anthropic.claude-sonnet-4-20250514-v1:0".
  - env: LLM_DEFAULT_LLM_ID
    type: string
    optional: true
    help: >
      DataRobot Playground catalog identifier for the LLM Blueprint.

      Not the same as LLM_DEFAULT_MODEL. This is the internal DR ID used for governance.

      GET /api/v2/genai/llmgw/catalog/ on your DataRobot instance to see available values.

      Example: "azure-openai-gpt-5" for Azure OpenAI GPT-5.
  - env: LLM_DEFAULT_LLM_NAME
    type: string
    optional: true
    help: >
      Friendly display name for the LLM shown in DataRobot UI.
      Example: "Azure OpenAI GPT-5".
  - key: external_llm_provider
    optional: false
    options:
      - name: "Azure with OpenAI"
        requires: azure_openai
      - name: "Google VertexAI"
        requires: vertexai
      - name: "Anthropic"
        requires: anthropic
      - name: "Bedrock"
        requires: bedrock
      - name: "Cohere"
        requires: cohere
      - name: "TogetherAI"
        requires: togetherai
    help: >
      Choose which external LLM provider to use.
      Supported providers are: Azure OpenAI, AWS Bedrock, GCP VertexAI, Anthropic, Cohere, or TogetherAI.

azure_openai:
  - env: LLM_DEFAULT_MODEL
    type: string
    default: "azure/openai-gpt-5-mini"
    optional: false
    always_prompt: true
    help: "Enter the name of the external LLM model to use in LiteLLM format (e.g., azure/openai-gpt-5-mini)."
  - env: OPENAI_API_KEY
    type: string
    optional: false
    help: "Enter the OpenAI API key."
  - env: OPENAI_API_BASE
    type: string
    optional: false
    help: "Enter the OpenAI API base URL (e.g., https://<your_custom_endpoint>.openai.azure.com)."
  - env: OPENAI_API_DEPLOYMENT_ID
    type: string
    optional: false
    help: "Enter the OpenAI API deployment ID (e.g., gpt-5-mini)."
  - env: OPENAI_API_VERSION
    type: string
    optional: false
    help: "Enter the OpenAI API version (e.g., 2024-08-01-preview)."

bedrock:
  - env: LLM_DEFAULT_MODEL
    type: string
    default: "bedrock/anthropic.claude-3-5-sonnet-20240620-v1:0"
    optional: false
    always_prompt: true
    help: "Enter the name of the external LLM model to use in LiteLLM format (e.g., bedrock/anthropic.claude-3-5-sonnet-20240620-v1:0)."
  - env: AWS_ACCESS_KEY_ID
    type: string
    optional: false
    help: "Enter the AWS access key ID for Bedrock."
  - env: AWS_SECRET_ACCESS_KEY
    type: string
    optional: false
    help: "Enter the AWS secret access key for Bedrock."
  - env: AWS_REGION_NAME
    type: string
    optional: false
    help: "Enter the AWS region name for Bedrock (e.g., us-east-1)."

vertexai:
  - env: LLM_DEFAULT_MODEL
    type: string
    default: "vertex_ai/claude-opus-4@20250514"
    optional: false
    always_prompt: true
    help: "Enter the name of the external LLM model to use in LiteLLM format (e.g., vertexai/custom_llm)."
  - env: VERTEXAI_APPLICATION_CREDENTIALS
    type: string
    optional: false
    help: "Enter the path to the VertexAI application credentials JSON file."
  - env: VERTEXAI_SERVICE_ACCOUNT
    type: string
    optional: false
    help: "Enter the Google service account email."

anthropic:
  - env: LLM_DEFAULT_MODEL
    type: string
    default: "anthropic/claude-3-5-sonnet-20240620"
    optional: false
    always_prompt: true
    help: "Enter the name of the external LLM model to use in LiteLLM format (e.g., anthropic/claude-3-5-sonnet-20240620)."
  - env: ANTHROPIC_API_KEY
    type: string
    optional: false
    help: "Enter the API key for Anthropic."

cohere:
  - env: LLM_DEFAULT_MODEL
    type: string
    default: "cohere/command-r-plus"
    optional: false
    always_prompt: true
    help: "Enter the name of the external LLM model to use in LiteLLM format (e.g., cohere/command-r-plus)."
  - env: COHERE_API_KEY
    type: string
    optional: false
    help: "Enter the API key for Cohere."

togetherai:
  - env: LLM_DEFAULT_MODEL
    type: string
    default: "together_ai/meta-llama/Llama-3.1-8B-Instruct-Turbo"
    optional: false
    always_prompt: true
    help: "Enter the name of the external LLM model to use in LiteLLM format (e.g., together_ai/meta-llama/Llama-3.1-8B-Instruct-Turbo)."
  - env: TOGETHERAI_API_KEY
    type: string
    optional: false
    help: "Enter the API key for TogetherAI."
