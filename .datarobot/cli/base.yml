---
root:
  - env: PULUMI_CONFIG_PASSPHRASE
    type: secret_string
    default: ""
    optional: true
    help: >
      Enter the passphrase used to encrypt and decrypt the private key. This value is required if you're not using Pulumi
      Cloud.
  - env: DATAROBOT_DEFAULT_USE_CASE
    type: string
    default:
    optional: true
    help: "Enter the default use case for this application. If not set, a new use case will be created automatically."
  - env: USE_DATAROBOT_LLM_GATEWAY
    type: "boolean"
    help: "Use LLM Gateway instead of DataRobot-hosted LLM. If you select this, you do not need any credentials for your DataRobot-hosted LLM since it will use your DataRobot credentials instead."
    default: "true"
    multiple: false
    options:
      - name: "Yes"
        value: "true"
      - name: "No"
        value: "false"
        requires: "datarobot_hosted_llm"
  - env: DATABASE_CONNECTION_TYPE
    type: string
    help: Do you want to enable an external database connection?
    default: no_database
    options:
      - name: None
        value: no_database
      - name: JDBC (PostgreSQL / MySQL / SQL Server / Snowflake / SAP Datasphere / BigQuery)
        value: datarobot_jdbc
        requires: jdbc_config
  - env: OTEL_SDK_DISABLED
    type: string
    default: ""
    optional: true
    help: "Set to 'true' to disable all OpenTelemetry tracing. Leave empty to keep tracing enabled."

datarobot_hosted_llm:
  - key: "enable_google_vertexai"
    help: "Do you want to configure Google VertexAI?"
    options:
      - name: "No"
      - name: "Yes"
        requires: "google_cloud_config"
  - key: "enable_aws_bedrock"
    help: "Do you want to configure AWS Bedrock?"
    options:
      - name: "No"
      - name: "Yes"
        requires: "aws_config"
  - key: "enable_openai"
    help: "Do you want to configure OpenAI?"
    options:
      - name: "No"
      - name: "Yes"
        requires: "openai_config"

google_cloud_config:
  - env: GOOGLE_SERVICE_ACCOUNT
    type: string
    optional: false
    help: "The Google Service Account JSON file content"
  - env: GOOGLE_REGION
    type: string
    optional: false
    help: "The Google Cloud Region"

aws_config:
  - env: AWS_ACCESS_KEY_ID
    type: string
    optional: false
    help: "The AWS access key ID for Bedrock."
  - env: AWS_SECRET_ACCESS_KEY
    type: secret_string
    optional: false
    help: "The AWS secret access key for Bedrock."
  - env: AWS_REGION
    type: string
    optional: false
    help: "The AWS region name for Bedrock, e.g., us-east-1."
  - env: AWS_SESSION_TOKEN
    type: string
    optional: true
    help: "The AWS Session Token"

openai_config:
  - env: OPENAI_API_KEY
    type: secret_string
    optional: false
    help: "The API key for OpenAI."
  - env: OPENAI_API_BASE
    type: string
    optional: false
    help: "The API base URL for OpenAI, usually in the format https://<your_custom_endpoint>.openai.azure.com"
  - env: OPENAI_API_DEPLOYMENT_ID
    type: string
    optional: false
    help: "The deployment ID for the OpenAI model."
  - env: OPENAI_API_VERSION
    type: string
    optional: false
    help: "The API version for OpenAI."

jdbc_config:
  - env: JDBC_URI
    type: secret_string
    optional: false
    help: "The full JDBC connection string, e.g. jdbc:postgresql://host:5432/db. Credentials may be embedded in the URI or passed via JDBC_CONNECTION_PARAMETERS."
  - env: JDBC_CONNECTION_PARAMETERS
    type: secret_string
    optional: true
    help: 'Optional JSON object of JDBC connection parameters, e.g. {"user": "dbuser", "password": "secret"}.'

